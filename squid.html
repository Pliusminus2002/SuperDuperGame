<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <base href="/SuperDuperGame/">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 20;
      color: white;
      background: rgba(0,0,0,0.55);
      padding: 12px 14px;
      border-radius: 12px;
      min-width: 240px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    #bigMessage {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.55);
      z-index: 30;
      font-size: 40px;
      font-weight: 700;
      padding: 30px;
      white-space: pre-line;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 20;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      display: none;
    }

    #honeycombOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      z-index: 40;
      flex-direction: column;
      color: white;
      gap: 12px;
    }

    #honeyCanvas {
      background: #f4d27a;
      border-radius: 16px;
      border: 4px solid #d8a94a;
      cursor: crosshair;
    }

    #barWrap {
      margin-top: 8px;
      display: none;
    }

    .hpRow {
      margin-top: 6px;
      font-size: 14px;
    }

    .hpBar {
      width: 180px;
      height: 14px;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }

    .hpFill {
      height: 100%;
      background: #ff4d4d;
      width: 100%;
    }

    #enemyHpFill {
      background: #6fd96f;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="ui">
    <div><b>Squid Game</b></div>
    <div id="stageText">Stage: 1</div>
    <div id="stateText">Loading...</div>
    <div id="timerText">Laikas: --</div>

    <div id="barWrap">
      <div class="hpRow">Tavo HP</div>
      <div class="hpBar"><div id="playerHpFill" class="hpFill"></div></div>

      <div class="hpRow">NPC HP</div>
      <div class="hpBar"><div id="enemyHpFill" class="hpFill"></div></div>
    </div>
  </div>

  <div id="bigMessage"></div>
  <div id="hint"></div>

  <div id="honeycombOverlay">
    <div id="honeyInfo">Honeycomb</div>
    <canvas id="honeyCanvas" width="420" height="420"></canvas>
    <div>Laikyk nuspaudęs pelę ir apvesk liniją. Neišeik už krašto.</div>
  </div>

  <script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
    const canvas = document.getElementById("game");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    scene.fog = new THREE.Fog(0x111111, 40, 220);

    const camera = new THREE.PerspectiveCamera(
      70,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(0, 7, 12);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(20, 25, 10);
    scene.add(light);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));

    const stageText = document.getElementById("stageText");
    const stateText = document.getElementById("stateText");
    const timerText = document.getElementById("timerText");
    const bigMessage = document.getElementById("bigMessage");
    const hint = document.getElementById("hint");
    const honeycombOverlay = document.getElementById("honeycombOverlay");
    const honeyCanvas = document.getElementById("honeyCanvas");
    const honeyCtx = honeyCanvas.getContext("2d");

    const barWrap = document.getElementById("barWrap");
    const playerHpFill = document.getElementById("playerHpFill");
    const enemyHpFill = document.getElementById("enemyHpFill");

    const clock = new THREE.Clock();
    const loader = new GLTFLoader();
let mixer = null;
    let player = null;
    let fallbackPlayer = null;

    const keys = {
      w: false,
      a: false,
      s: false,
      d: false,
      shift: false,
      space: false
    };

    let controlsLocked = false;
    let stage = 1;
    let stageStarted = false;
    let stageTimer = 0;
    let currentRoot = null;
    

    let moveSpeed = 8;
    let enemy = null;
    let enemyHp = 100;
    let playerHp = 100;
    let enemyAttackCooldown = 0;
    let playerAttackCooldown = 0;
let stageTransitioning = false;
    // -------------------------
    // COMMON HELPERS
    // -------------------------
    function showHint(text, sec = 2.5) {
      hint.textContent = text;
      hint.style.display = "block";
      clearTimeout(showHint._t);
      showHint._t = setTimeout(() => {
        hint.style.display = "none";
      }, sec * 1000);
    }

    function showBigMessage(text, sec = 2) {
      bigMessage.textContent = text;
      bigMessage.style.display = "flex";
      clearTimeout(showBigMessage._t);
      showBigMessage._t = setTimeout(() => {
        bigMessage.style.display = "none";
      }, sec * 1000);
    }

    function updateUI() {
      stageText.textContent = `Stage: ${stage}`;
      timerText.textContent = `Laikas: ${Math.max(0, Math.ceil(stageTimer))}`;
      playerHpFill.style.width = `${Math.max(0, playerHp)}%`;
      enemyHpFill.style.width = `${Math.max(0, enemyHp)}%`;
    }

    function clearStageRoot() {
      if (!currentRoot) return;
      scene.remove(currentRoot);
      currentRoot.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose?.();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
          else obj.material.dispose?.();
        }
      });
      currentRoot = null;
    }

    function makeStageRoot() {
      clearStageRoot();
      currentRoot = new THREE.Group();
      scene.add(currentRoot);
    }

    function setPlayerPos(x, y, z) {
      const obj = player || fallbackPlayer;
      if (!obj) return;
      obj.position.set(x, y, z);
    }

    function getPlayerObj() {
      return player || fallbackPlayer;
    }

   function respawnCurrentStage(message = "Bandyk dar kartą") {
  stageTransitioning = false;
  showBigMessage(message, 1.7);
  stageStarted = false;
  controlsLocked = false;
  startStage(stage);
}

   function nextStage() {
  stageTransitioning = false;
  stage++;
  stageStarted = false;
  controlsLocked = false;
  startStage(stage);
}

    function goToMenuOrStory() {
      showBigMessage("Tu įveikei visus žaidimus!", 3);
      setTimeout(() => {
        window.location.href = "./index.html";
      }, 2500);
    }

    function updateCamera() {
      const obj = getPlayerObj();
      if (!obj) return;

      const targetPos = obj.position.clone();
      const desired = targetPos.clone().add(new THREE.Vector3(0, 7, 11));
      camera.position.lerp(desired, 0.08);
      camera.lookAt(targetPos.clone().add(new THREE.Vector3(0, 1.7, 0)));
    }

    function updatePlayerMovement(delta) {
      const obj = getPlayerObj();
      if (!obj || controlsLocked) return;

      let mx = 0;
      let mz = 0;

      if (keys.w) mz -= 1;
      if (keys.s) mz += 1;
      if (keys.a) mx -= 1;
      if (keys.d) mx += 1;

      const dir = new THREE.Vector3(mx, 0, mz);
      if (dir.lengthSq() === 0) return;

      dir.normalize();
      const speed = keys.shift ? moveSpeed * 1.4 : moveSpeed;
      obj.position.add(dir.multiplyScalar(speed * delta));

      obj.rotation.y = Math.atan2(mx, mz);
    }

    // -------------------------
    // PLAYER LOAD
    // -------------------------
    function createFallbackPlayer() {
      const g = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.5, 1.2, 4, 8),
        new THREE.MeshStandardMaterial({ color: 0x66ccff })
      );
      body.position.y = 1.1;
      g.add(body);

      fallbackPlayer = g;
      scene.add(fallbackPlayer);
      setPlayerPos(0, 0, 0);
    }

loader.load(
  "/SuperDuperGame/models/ninja@idle.glb",
  (gltf) => {
    player = gltf.scene;
    player.scale.set(1.4, 1.4, 1.4);
    scene.add(player);

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(player);
      const idleAction = mixer.clipAction(gltf.animations[0]);
      idleAction.play();
    }

    startStage(1);
  },
  undefined,
  (err) => {
    console.error("Nepavyko užkrauti ninja@idle.glb:", err);
    createFallbackPlayer();
    startStage(1);
  }
);

    // -------------------------
    // STAGE 1 - RED LIGHT GREEN LIGHT
    // -------------------------
    let rlgl = null;

    function buildStage1() {
      makeStageRoot();

      const root = currentRoot;
      const ARENA_X = 0;
      const ARENA_Z = 0;
      const ARENA_RADIUS = 26;

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(ARENA_RADIUS, 64),
        new THREE.MeshStandardMaterial({ color: 0xd8c07a })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(ARENA_X, 0, ARENA_Z);
      root.add(floor);

      const startLine = new THREE.Mesh(
        new THREE.BoxGeometry(12, 0.05, 0.5),
        new THREE.MeshBasicMaterial({ color: 0x00ff88 })
      );
      startLine.position.set(0, 0.03, 18);
      root.add(startLine);

      const finishLine = new THREE.Mesh(
        new THREE.BoxGeometry(12, 0.05, 0.5),
        new THREE.MeshBasicMaterial({ color: 0xff3355 })
      );
      finishLine.position.set(0, 0.03, -18);
      root.add(finishLine);

      const doll = new THREE.Mesh(
        new THREE.BoxGeometry(2, 4, 2),
        new THREE.MeshStandardMaterial({ color: 0xffb38a })
      );
      doll.position.set(0, 2, -22);
      root.add(doll);

      setPlayerPos(0, 0, 18);
      stageTimer = 45;
      stateText.textContent = "🟢 GREEN LIGHT";

      rlgl = {
        phase: "green",
        phaseT: 0,
        doll,
        lastPos: new THREE.Vector3(0, 0, 18),
        moveThreshold: 0.025
      };

      showBigMessage("1 žaidimas\nRed Light Green Light", 2);
      showHint("WASD judėjimas. Sustok per RED LIGHT.");
    }

    function updateStage1(delta) {
      const obj = getPlayerObj();
      if (!obj || !rlgl) return;

      stageTimer -= delta;
      rlgl.phaseT += delta;

      if (rlgl.phase === "green" && rlgl.phaseT >= 3) {
        rlgl.phase = "red";
        rlgl.phaseT = 0;
        stateText.textContent = "🔴 RED LIGHT";
      } else if (rlgl.phase === "red" && rlgl.phaseT >= 2) {
        rlgl.phase = "green";
        rlgl.phaseT = 0;
        stateText.textContent = "🟢 GREEN LIGHT";
      }

      rlgl.doll.rotation.y = THREE.MathUtils.lerp(
        rlgl.doll.rotation.y,
        rlgl.phase === "red" ? Math.PI : 0,
        0.1
      );

      if (rlgl.phase === "red") {
        const moved = obj.position.distanceTo(rlgl.lastPos) > rlgl.moveThreshold;
        if (moved) {
          respawnCurrentStage("Tu pajudėjai per RED LIGHT 💀");
          return;
        }
      }

      rlgl.lastPos.copy(obj.position);

   if (obj.position.z <= -18) {
  if (stageTransitioning) return;
  stageTransitioning = true;
  controlsLocked = true;
  showBigMessage("1 žaidimas įveiktas!", 2);
  setTimeout(nextStage, 1800);
  return;
}

      if (stageTimer <= 0) {
        respawnCurrentStage("Baigėsi laikas 💀");
      }
    }

    // -------------------------
    // STAGE 2 - GLASS BRIDGE
    // -------------------------
    let bridge = null;

    function buildStage2() {
      makeStageRoot();

      const root = currentRoot;

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(120, 120),
        new THREE.MeshStandardMaterial({ color: 0x111111 })
      );
      floor.rotation.x = -Math.PI / 2;
      root.add(floor);

      const panels = [];
      const safePath = [];
      const rows = 8;
      const rowSpacing = 4;
      const startZ = 14;

      for (let i = 0; i < rows; i++) {
        const safeSide = Math.random() < 0.5 ? "left" : "right";
        safePath.push(safeSide);

        const z = startZ - i * rowSpacing;

        const left = new THREE.Mesh(
          new THREE.BoxGeometry(2.6, 0.25, 2.6),
          new THREE.MeshStandardMaterial({ color: 0x8fd3ff, transparent: true, opacity: 0.7 })
        );
        left.position.set(-2.2, 1.2, z);
        root.add(left);

        const right = new THREE.Mesh(
          new THREE.BoxGeometry(2.6, 0.25, 2.6),
          new THREE.MeshStandardMaterial({ color: 0x8fd3ff, transparent: true, opacity: 0.7 })
        );
        right.position.set(2.2, 1.2, z);
        root.add(right);

        panels.push({
          row: i,
          left,
          right,
          safe: safeSide,
          broken: false
        });
      }

      const startPlatform = new THREE.Mesh(
        new THREE.BoxGeometry(8, 1, 5),
        new THREE.MeshStandardMaterial({ color: 0x666666 })
      );
      startPlatform.position.set(0, 0.5, 18);
      root.add(startPlatform);

      const endPlatform = new THREE.Mesh(
        new THREE.BoxGeometry(8, 1, 5),
        new THREE.MeshStandardMaterial({ color: 0x666666 })
      );
      endPlatform.position.set(0, 0.5, -18);
      root.add(endPlatform);

      setPlayerPos(0, 1.2, 18);
      stageTimer = 70;
      stateText.textContent = "Glass Bridge";
      bridge = { panels, rows };

      showBigMessage("2 žaidimas\nGlass Bridge", 2);
      showHint("Pasirink teisingą stiklo plytelę.");
    }

    function updateStage2(delta) {
      const obj = getPlayerObj();
      if (!obj || !bridge) return;

      stageTimer -= delta;

      for (const panel of bridge.panels) {
        if (panel.broken) continue;

        const lp = panel.left.position;
        const rp = panel.right.position;

        const onLeft =
          Math.abs(obj.position.x - lp.x) < 1.3 &&
          Math.abs(obj.position.z - lp.z) < 1.3 &&
          obj.position.y > 0.5;

        const onRight =
          Math.abs(obj.position.x - rp.x) < 1.3 &&
          Math.abs(obj.position.z - rp.z) < 1.3 &&
          obj.position.y > 0.5;

        if (onLeft && panel.safe !== "left") {
          panel.broken = true;
          currentRoot.remove(panel.left);
          respawnCurrentStage("Netinkamas stiklas 💀");
          return;
        }

        if (onRight && panel.safe !== "right") {
          panel.broken = true;
          currentRoot.remove(panel.right);
          respawnCurrentStage("Netinkamas stiklas 💀");
          return;
        }
      }

      if (obj.position.z <= -18) {
  if (stageTransitioning) return;
  stageTransitioning = true;
  controlsLocked = true;
  showBigMessage("2 žaidimas įveiktas!", 2);
  setTimeout(nextStage, 1800);
  return;
}

      if (stageTimer <= 0) {
        respawnCurrentStage("Baigėsi laikas 💀");
      }
    }

    // -------------------------
    // STAGE 3 - MEMORY TILES
    // -------------------------
    let memoryGame = null;

    function buildStage3() {
      makeStageRoot();

      const root = currentRoot;
      const tiles = [];
      const size = 2.5;
      const gap = 0.4;
      const offset = -((size + gap) * 1);

      for (let z = 0; z < 3; z++) {
        for (let x = 0; x < 3; x++) {
          const tile = new THREE.Mesh(
            new THREE.BoxGeometry(size, 0.5, size),
            new THREE.MeshStandardMaterial({ color: 0x555555 })
          );
          tile.position.set(offset + x * (size + gap), 0.25, offset + z * (size + gap));
          root.add(tile);
          tiles.push(tile);
        }
      }

      const sequence = [];
      while (sequence.length < 5) {
        sequence.push(Math.floor(Math.random() * tiles.length));
      }

      setPlayerPos(0, 0.7, 7);
      stageTimer = 35;
      controlsLocked = true;
      stateText.textContent = "Memory Tiles";

      memoryGame = {
        tiles,
        sequence,
        inputIndex: 0,
        phase: "show",
        showIndex: 0,
        showTimer: 0,
        touchedCooldown: 0
      };

      showBigMessage("3 žaidimas\nMemory Tiles", 2);
      showHint("Įsimink seką ir užlipk ant plytelių ta pačia tvarka.", 4);
    }

    function updateStage3(delta) {
      const obj = getPlayerObj();
      if (!obj || !memoryGame) return;

      stageTimer -= delta;
      memoryGame.touchedCooldown -= delta;

      if (memoryGame.phase === "show") {
        memoryGame.showTimer += delta;

        memoryGame.tiles.forEach(t => t.material.color.set(0x555555));

        const idx = memoryGame.sequence[memoryGame.showIndex];
        if (memoryGame.showTimer < 0.8 && idx !== undefined) {
          memoryGame.tiles[idx].material.color.set(0xffff55);
        }

        if (memoryGame.showTimer >= 1.1) {
          memoryGame.showTimer = 0;
          memoryGame.showIndex++;

          if (memoryGame.showIndex >= memoryGame.sequence.length) {
            memoryGame.phase = "input";
            controlsLocked = false;
            showHint("Dabar pakartok seką.");
          }
        }

        return;
      }

      for (let i = 0; i < memoryGame.tiles.length; i++) {
        const t = memoryGame.tiles[i];
        const onTile =
          Math.abs(obj.position.x - t.position.x) < 1.1 &&
          Math.abs(obj.position.z - t.position.z) < 1.1;

        if (onTile && memoryGame.touchedCooldown <= 0) {
          memoryGame.touchedCooldown = 0.45;

          if (memoryGame.sequence[memoryGame.inputIndex] === i) {
            t.material.color.set(0x55ff55);
            memoryGame.inputIndex++;

           if (memoryGame.inputIndex >= memoryGame.sequence.length) {
  if (stageTransitioning) return;
  stageTransitioning = true;
  controlsLocked = true;
  showBigMessage("3 žaidimas įveiktas!", 2);
  setTimeout(nextStage, 1800);
  return;
}
          } else {
            respawnCurrentStage("Neteisinga plytelė 💀");
            return;
          }
        }
      }

      if (stageTimer <= 0) {
        respawnCurrentStage("Baigėsi laikas 💀");
      }
    }

    // -------------------------
    // STAGE 4 - HONEYCOMB
    // -------------------------
    let honey = null;

    function buildStage4() {
      makeStageRoot();

      const root = currentRoot;
      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(12, 40),
        new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
      );
      floor.rotation.x = -Math.PI / 2;
      root.add(floor);

      setPlayerPos(0, 0, 0);
      controlsLocked = true;
      stageTimer = 25;
      stateText.textContent = "Honeycomb";

      honey = {
        active: true,
        drawing: false,
        progress: 0,
        targetPoints: createHoneyPath()
      };

      honeycombOverlay.style.display = "flex";
      showBigMessage("4 žaidimas\nHoneycomb", 2);
      drawHoneycomb();
    }

    function createHoneyPath() {
      // paprasta “žvaigždės / trikampio” seka
      return [
        { x: 210, y: 70 },
        { x: 300, y: 170 },
        { x: 255, y: 320 },
        { x: 165, y: 320 },
        { x: 120, y: 170 },
        { x: 210, y: 70 }
      ];
    }

    function drawHoneycomb() {
      honeyCtx.clearRect(0, 0, honeyCanvas.width, honeyCanvas.height);

      honeyCtx.fillStyle = "#f4d27a";
      honeyCtx.fillRect(0, 0, honeyCanvas.width, honeyCanvas.height);

      honeyCtx.lineWidth = 18;
      honeyCtx.lineCap = "round";
      honeyCtx.lineJoin = "round";
      honeyCtx.strokeStyle = "#c6903b";

      honeyCtx.beginPath();
      const pts = honey.targetPoints;
      honeyCtx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        honeyCtx.lineTo(pts[i].x, pts[i].y);
      }
      honeyCtx.stroke();

      honeyCtx.lineWidth = 4;
      honeyCtx.strokeStyle = "#6a3d10";
      honeyCtx.stroke();
    }

    function getMousePos(e) {
      const rect = honeyCanvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (honeyCanvas.width / rect.width),
        y: (e.clientY - rect.top) * (honeyCanvas.height / rect.height)
      };
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    honeyCanvas.addEventListener("mousedown", (e) => {
      if (!honey || !honey.active) return;
      const p = getMousePos(e);
      if (distance(p, honey.targetPoints[0]) < 25) {
        honey.drawing = true;
        honey.progress = 1;
      }
    });

    window.addEventListener("mouseup", () => {
      if (honey) honey.drawing = false;
    });

    honeyCanvas.addEventListener("mousemove", (e) => {
      if (!honey || !honey.active || !honey.drawing) return;

      const p = getMousePos(e);
      const target = honey.targetPoints[honey.progress];
      if (!target) return;

      if (distance(p, target) < 26) {
        honey.progress++;

      if (honey.progress >= honey.targetPoints.length) {
  if (stageTransitioning) return;
  stageTransitioning = true;
  honey.active = false;
  honeycombOverlay.style.display = "none";
  controlsLocked = true;
  showBigMessage("4 žaidimas įveiktas!", 2);
  setTimeout(nextStage, 1800);
}
      } else {
        // jei per toli nuo sekančio taško – pralaimi
        if (distance(p, target) > 80) {
          honeycombOverlay.style.display = "none";
          honey.active = false;
          respawnCurrentStage("Sulaužei honeycomb 💀");
        }
      }
    });

    function updateStage4(delta) {
      stageTimer -= delta;
      if (stageTimer <= 0) {
        honeycombOverlay.style.display = "none";
        respawnCurrentStage("Baigėsi laikas 💀");
      }
    }

    // -------------------------
    // STAGE 5 - FINAL NPC FIGHT (simple prototype)
    // -------------------------
    let fight = null;

    function buildStage5() {
      makeStageRoot();

      const root = currentRoot;

      const arena = new THREE.Mesh(
        new THREE.CircleGeometry(18, 50),
        new THREE.MeshStandardMaterial({ color: 0x5f2d2d })
      );
      arena.rotation.x = -Math.PI / 2;
      root.add(arena);

      enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 2.6, 1.4),
        new THREE.MeshStandardMaterial({ color: 0xff4444 })
      );
      enemy.position.set(0, 1.3, -8);
      root.add(enemy);

      setPlayerPos(0, 0, 8);
      playerHp = 100;
      enemyHp = 100;
      enemyAttackCooldown = 0;
      playerAttackCooldown = 0;
      stageTimer = 80;
      controlsLocked = false;

      barWrap.style.display = "block";
      stateText.textContent = "Final Fight";

      fight = {
        active: true
      };

      showBigMessage("Finalas\nNPC kova", 2);
      showHint("Priartėk ir spausk SPACE atakai.");
    }

    function updateStage5(delta) {
      const obj = getPlayerObj();
      if (!obj || !enemy || !fight) return;

      stageTimer -= delta;
      enemyAttackCooldown -= delta;
      playerAttackCooldown -= delta;

      const dir = new THREE.Vector3().subVectors(obj.position, enemy.position);
      dir.y = 0;
      const dist = dir.length();

      if (dist > 0.001) {
        dir.normalize();
      }

      // enemy chase
      if (dist > 2.2) {
        enemy.position.add(dir.multiplyScalar(4 * delta));
      }

      enemy.rotation.y = Math.atan2(
        obj.position.x - enemy.position.x,
        obj.position.z - enemy.position.z
      );

      // enemy attack
      if (dist < 2.2 && enemyAttackCooldown <= 0) {
        enemyAttackCooldown = 1.0;
        playerHp -= 12;
        showHint("NPC trenkė tau!");
      }

      // player attack
      if (keys.space && dist < 2.6 && playerAttackCooldown <= 0) {
        playerAttackCooldown = 0.55;
        enemyHp -= 18;
        showHint("Tu trenkiai NPC!");
      }

      if (playerHp <= 0) {
        barWrap.style.display = "none";
        respawnCurrentStage("Tu pralaimėjai finalą 💀");
        return;
      }

      if (enemyHp <= 0) {
        barWrap.style.display = "none";
        showBigMessage("Laimėjai finalą! 🏆", 2.5);
        setTimeout(goToMenuOrStory, 2200);
        return;
      }

      if (stageTimer <= 0) {
        barWrap.style.display = "none";
        respawnCurrentStage("Baigėsi laikas 💀");
      }
    }

    // -------------------------
    // STAGE MANAGER
    // -------------------------
   function startStage(num) {
  stage = num;
  stageTransitioning = false;
  updateUI();

  if (stage === 1) buildStage1();
  else if (stage === 2) buildStage2();
  else if (stage === 3) buildStage3();
  else if (stage === 4) buildStage4();
  else if (stage === 5) buildStage5();
}

    function updateStages(delta) {
      if (stage === 1) updateStage1(delta);
      else if (stage === 2) updateStage2(delta);
      else if (stage === 3) updateStage3(delta);
      else if (stage === 4) updateStage4(delta);
      else if (stage === 5) updateStage5(delta);
    }

    // -------------------------
    // INPUT
    // -------------------------
    window.addEventListener("keydown", (e) => {
      if (e.key === "w" || e.key === "W") keys.w = true;
      if (e.key === "a" || e.key === "A") keys.a = true;
      if (e.key === "s" || e.key === "S") keys.s = true;
      if (e.key === "d" || e.key === "D") keys.d = true;
      if (e.key === "Shift") keys.shift = true;
      if (e.key === " ") keys.space = true;
    });

    window.addEventListener("keyup", (e) => {
      if (e.key === "w" || e.key === "W") keys.w = false;
      if (e.key === "a" || e.key === "A") keys.a = false;
      if (e.key === "s" || e.key === "S") keys.s = false;
      if (e.key === "d" || e.key === "D") keys.d = false;
      if (e.key === "Shift") keys.shift = false;
      if (e.key === " ") keys.space = false;
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -------------------------
    // LOOP
    // -------------------------
    function animate() {
      requestAnimationFrame(animate);

   const delta = clock.getDelta();

if (mixer) mixer.update(delta);

updatePlayerMovement(delta);
updateStages(delta);
updateCamera();
updateUI();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
